<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooserage Chatbot Assistant</title>
    <meta name="description" content="Mooserage AI Chatbot Assistant — Your friendly AI helper for writing, planning, and problem-solving.">
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Chat History</h2>
            <button class="btn-icon" onclick="toggleSidebar()" style="display:none" id="closeSidebarBtn">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <div style="padding:12px 16px;flex-shrink:0;">
            <button class="btn btn-new-chat" onclick="startNewChat()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                New Chat
            </button>
            <button class="btn btn-clear-all" onclick="showClearAllModal()">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Clear All Chats
            </button>
        </div>

        <div class="sidebar-loading" id="sidebarLoading">
            <div class="spinner"></div>
            <span id="sidebarLoadingText">Loading...</span>
        </div>

        <div class="session-list custom-scroll" id="sessionList"></div>

        <div class="sidebar-footer">
            <div class="footer-row">
                <span class="footer-brand">Mooserage Chatbot</span>
                <div style="display:flex;gap:4px;">
                    <button class="btn-icon" id="themeToggle" title="Toggle theme">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                    </button>
                    <button class="btn-icon" onclick="logout()" title="Logout" style="color:#DC2626;">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    </button>
                </div>
            </div>
            <div class="storage-bar-container" id="storageContainer">
                <div class="storage-label">
                    <span id="storageText">Loading...</span>
                    <span id="storagePct"></span>
                </div>
                <div class="storage-bar">
                    <div class="storage-bar-fill" id="storageFill"></div>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
        <!-- Mobile Header -->
        <header class="mobile-header" id="mobileHeader">
            <div style="display:flex;align-items:center;gap:8px;">
                <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#E8862A,#F5C518);display:flex;align-items:center;justify-content:center;">
                    <svg width="14" height="14" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                </div>
                <span style="font-weight:600;font-size:15px;">Mooserage</span>
            </div>
            <button class="btn-icon" onclick="toggleSidebar()" style="border:1px solid var(--border);">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
        </header>

        <!-- Storage Warning Banner -->
        <div class="storage-banner" id="storageBanner">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
            <span id="bannerText"></span>
            <button onclick="showClearAllModal()">Free up space</button>
        </div>

        <!-- Chat Container -->
        <div class="chat-container custom-scroll" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">
                    <svg width="28" height="28" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                </div>
                <h3>Welcome to Mooserage</h3>
                <p>I can help you draft emails, answer questions, plan your day, and so much more.</p>
                <div class="quick-actions">
                    <button class="btn-quick" onclick="setInput('Help me draft a professional email')">📧 Draft an email</button>
                    <button class="btn-quick" onclick="setInput('I have a general inquiry')">💬 General Inquiry</button>
                    <button class="btn-quick" onclick="setInput('Help me plan my day')">📋 Plan my day</button>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-area">
            <div class="input-wrapper">
                <button class="btn-voice" id="voiceBtn" title="Voice Input">
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                </button>
                <input type="text" class="chat-input" id="userInput" placeholder="Type your message..." autocomplete="off">
                <button class="btn btn-send" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
            <div class="input-disclaimer">Mooserage AI can make mistakes. Verify important information.</div>
        </div>
    </main>

    <!-- CONFIRMATION MODAL -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-card">
            <div class="modal-icon" id="modalIcon"><svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg></div>
            <h3 id="modalTitle">Confirm</h3>
            <p id="modalDesc">Are you sure?</p>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="hideModal()">Cancel</button>
                <button class="btn-modal btn-danger" id="modalConfirmBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
