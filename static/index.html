<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooserage Chatbot Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                container: { center: true, padding: "2rem", screens: { "2xl": "1400px" } },
                extend: {
                    fontFamily: { sans: ["Inter", "sans-serif"] },
                    colors: {
                        border: "hsl(var(--border))",
                        input: "hsl(var(--input))",
                        ring: "hsl(var(--ring))",
                        background: "hsl(var(--background))",
                        foreground: "hsl(var(--foreground))",
                        primary: { DEFAULT: "hsl(var(--primary))", foreground: "hsl(var(--primary-foreground))" },
                        secondary: { DEFAULT: "hsl(var(--secondary))", foreground: "hsl(var(--secondary-foreground))" },
                        destructive: { DEFAULT: "hsl(var(--destructive))", foreground: "hsl(var(--destructive-foreground))" },
                        muted: { DEFAULT: "hsl(var(--muted))", foreground: "hsl(var(--muted-foreground))" },
                        accent: { DEFAULT: "hsl(var(--accent))", foreground: "hsl(var(--accent-foreground))" },
                        card: { DEFAULT: "hsl(var(--card))", foreground: "hsl(var(--card-foreground))" },
                    },
                    borderRadius: { lg: "var(--radius)", md: "calc(var(--radius) - 2px)", sm: "calc(var(--radius) - 4px)" },
                },
            },
        }
    </script>
    <style>
        :root {
            --background: 0 0% 100%; --foreground: 240 10% 3.9%;
            --card: 0 0% 100%; --card-foreground: 240 10% 3.9%;
            --primary: 240 5.9% 10%; --primary-foreground: 0 0% 98%;
            --secondary: 240 4.8% 95.9%; --secondary-foreground: 240 5.9% 10%;
            --muted: 240 4.8% 95.9%; --muted-foreground: 240 3.8% 46.1%;
            --accent: 240 4.8% 95.9%; --accent-foreground: 240 5.9% 10%;
            --destructive: 0 84.2% 60.2%; --destructive-foreground: 0 0% 98%;
            --border: 240 5.9% 90%; --input: 240 5.9% 90%; --ring: 240 10% 3.9%;
            --radius: 0.5rem;
        }
        .dark {
            --background: 240 10% 3.9%; --foreground: 0 0% 98%;
            --card: 240 10% 3.9%; --card-foreground: 0 0% 98%;
            --primary: 0 0% 98%; --primary-foreground: 240 5.9% 10%;
            --secondary: 240 3.7% 15.9%; --secondary-foreground: 0 0% 98%;
            --muted: 240 3.7% 15.9%; --muted-foreground: 240 5% 64.9%;
            --accent: 240 3.7% 15.9%; --accent-foreground: 0 0% 98%;
            --destructive: 0 62.8% 30.6%; --destructive-foreground: 0 0% 98%;
            --border: 240 3.7% 15.9%; --input: 240 3.7% 15.9%; --ring: 240 4.9% 83.9%;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: hsl(var(--muted-foreground)/0.3); border-radius: 10px; }
        
        @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.5); } 70% { box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .recording { animation: pulse-ring 1.5s infinite; border-color: hsl(var(--destructive)) !important; color: hsl(var(--destructive)) !important; }

        /* --- MARKDOWN STYLES --- */
        .markdown-content { font-size: 0.95rem; line-height: 1.6; }
        .markdown-content p { margin-bottom: 0.75em; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content strong { font-weight: 700; color: inherit; }
        .markdown-content em { font-style: italic; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5em; margin: 0.5em 0; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.5em; margin: 0.5em 0; }
        .markdown-content li { margin: 0.25em 0; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: 700; margin-top: 1em; margin-bottom: 0.5em; line-height: 1.3; }
        .markdown-content h1 { font-size: 1.5em; }
        .markdown-content h2 { font-size: 1.25em; }
        .markdown-content h3 { font-size: 1.1em; }
        .markdown-content a { color: hsl(var(--primary)); text-decoration: underline; text-underline-offset: 4px; }
        .markdown-content blockquote { border-left: 3px solid hsl(var(--border)); padding-left: 1em; font-style: italic; opacity: 0.8; margin: 0.5em 0; }
        /* Code Blocks */
        .markdown-content code { background-color: rgba(150, 150, 150, 0.2); padding: 0.1em 0.3em; border-radius: 4px; font-family: monospace; font-size: 0.9em; }
        .markdown-content pre { background-color: #1e293b; color: #e2e8f0; padding: 1em; border-radius: 0.5rem; overflow-x: auto; margin: 0.75em 0; }
        .markdown-content pre code { background-color: transparent; padding: 0; color: inherit; font-size: 0.85em; }
    </style>
</head>
<body class="bg-background text-foreground antialiased h-screen w-full flex overflow-hidden">

    <aside id="sidebar" class="w-[280px] border-r bg-muted/10 hidden md:flex flex-col h-full shrink-0 transition-all duration-300 absolute z-50 md:relative md:inset-auto inset-y-0 left-0 bg-background md:bg-transparent">
        <div class="h-14 px-4 border-b flex items-center justify-between shrink-0">
            <span class="font-semibold tracking-tight text-sm">History</span>
            <button onclick="toggleSidebar()" class="md:hidden p-2 hover:bg-accent rounded-md">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="p-4 shrink-0">
            <button onclick="startNewChat()" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2 w-full justify-start">
                <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
        </div>

        <div id="sessionList" class="flex-1 overflow-y-auto px-2 space-y-1 custom-scrollbar pb-2">
            </div>

        <div class="p-4 border-t shrink-0">
            <div class="flex items-center justify-between">
                <span class="text-[10px] text-muted-foreground font-medium">Mooserage Chatbot</span>
                <button id="themeToggle" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-8 w-8">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative min-w-0 bg-background">
        <header class="h-14 border-b px-4 flex items-center justify-between md:hidden shrink-0 bg-background/95 backdrop-blur z-10">
            <div class="font-bold flex items-center gap-2">
                <div class="h-6 w-6 rounded-full bg-primary text-primary-foreground flex items-center justify-center text-xs">AI</div>
                <span>Mooserage Chatbot</span>
            </div>
            <button onclick="toggleSidebar()" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-9 w-9 border border-input">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </header>

        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 custom-scrollbar scroll-smooth">
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center p-8 animate-in fade-in duration-500">
                <div class="h-12 w-12 rounded-full bg-muted flex items-center justify-center mb-4">
                    <svg class="h-6 w-6 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 class="text-lg font-semibold tracking-tight">Welcome to Mooserage Chatbot</h3>
                <p class="text-sm text-muted-foreground max-w-xs mb-6">I can help you draft emails, answer questions, or plan your day.</p>
                
                <div class="flex flex-wrap justify-center gap-2 w-full max-w-md">
                    <button onclick="setInput('Help me draft a professional email')" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2">
                        Draft an email
                    </button>
                    <button onclick="setInput('I have a general inquiry')" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-4 py-2">
                        General Inquiry
                    </button>
                </div>
            </div>
        </div>

        <div class="p-4 border-t bg-background shrink-0 z-10">
            <div class="max-w-3xl mx-auto">
                <form onsubmit="event.preventDefault(); sendMessage();" class="flex w-full items-center gap-2">
                    <button type="button" id="voiceBtn" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 border border-input bg-background hover:bg-accent hover:text-accent-foreground h-10 w-10 shrink-0" title="Voice Input">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                    </button>
                    <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off"
                        class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50">
                    <button type="submit" id="sendBtn" class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2">
                        Send
                    </button>
                </form>
                <div class="text-center mt-2">
                    <p class="text-[10px] text-muted-foreground">Mooserage AI can make mistakes. Verify important information.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentSessionId = null;
        const chatContainer = document.getElementById('chatContainer');
        const sessionList = document.getElementById('sessionList');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');
        const sidebar = document.getElementById('sidebar');
        const voiceBtn = document.getElementById('voiceBtn');

        marked.use({ breaks: true });

        document.addEventListener('DOMContentLoaded', () => {
            loadSessions();
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') document.documentElement.classList.add('dark');
            userInput.focus();
        });

        function setInput(text) { userInput.value = text; userInput.focus(); }
        function toggleSidebar() { sidebar.classList.toggle('hidden'); sidebar.classList.toggle('flex'); }
        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.onstart = () => voiceBtn.classList.add('recording');
            recognition.onend = () => voiceBtn.classList.remove('recording');
            recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; sendMessage(); };
            voiceBtn.addEventListener('click', () => recognition.start());
        } else { voiceBtn.style.display = 'none'; }

        // --- SESSION MANAGEMENT ---

        async function loadSessions() {
            try {
                const res = await fetch('/sessions');
                const data = await res.json();
                sessionList.innerHTML = '';
                
                if (data.sessions.length > 0) {
                    data.sessions.forEach(session => {
                        const div = document.createElement('div');
                        const isActive = session.id === currentSessionId;
                        div.className = `group flex items-center gap-2 w-full p-2 rounded-md text-sm transition-colors mb-1 cursor-pointer ${
                            isActive ? 'bg-secondary text-secondary-foreground font-medium' : 'hover:bg-accent hover:text-accent-foreground text-muted-foreground'
                        }`;
                        div.onclick = () => { loadChat(session.id); if(window.innerWidth < 768) toggleSidebar(); };
                        div.innerHTML = `<span class="flex-1 truncate">${session.title}</span>`;

                        const actions = document.createElement('div');
                        actions.className = 'flex opacity-0 group-hover:opacity-100 transition-opacity gap-1';
                        
                        const editBtn = document.createElement('button');
                        editBtn.innerHTML = '<svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>';
                        editBtn.className = 'p-1 hover:bg-background rounded text-foreground';
                        editBtn.onclick = (e) => { e.stopPropagation(); renameSession(session.id, session.title); };
                        
                        const delBtn = document.createElement('button');
                        delBtn.innerHTML = '<svg class="h-3 w-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>';
                        delBtn.className = 'p-1 hover:bg-background rounded text-destructive';
                        delBtn.onclick = (e) => { e.stopPropagation(); deleteSession(session.id); };

                        actions.appendChild(editBtn);
                        actions.appendChild(delBtn);
                        div.appendChild(actions);
                        sessionList.appendChild(div);
                    });
                } else {
                    sessionList.innerHTML = '<div class="p-4 text-xs text-center text-muted-foreground">No history yet.</div>';
                }
            } catch (e) { console.error(e); }
        }

        async function renameSession(id, currentTitle) {
            const newTitle = prompt("Rename chat:", currentTitle);
            if (newTitle && newTitle !== currentTitle) {
                try {
                    await fetch(`/sessions/${id}/rename`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title: newTitle })
                    });
                    loadSessions();
                } catch (e) { alert("Failed to rename"); }
            }
        }

        async function deleteSession(id) {
            if (confirm("Are you sure you want to delete this chat?")) {
                try {
                    await fetch(`/sessions/${id}`, { method: 'DELETE' });
                    if (currentSessionId === id) startNewChat();
                    else loadSessions();
                } catch (e) { alert("Failed to delete"); }
            }
        }

        async function loadChat(id) {
            currentSessionId = id;
            emptyState.style.display = 'none';
            chatContainer.innerHTML = '';
            loadSessions();
            try {
                const res = await fetch(`/sessions/${id}`);
                const data = await res.json();
                if (data.session.messages.length === 0) {
                    emptyState.style.display = 'flex';
                    chatContainer.appendChild(emptyState);
                } else {
                    data.session.messages.forEach(msg => {
                        appendMessage(msg.user, true);
                        appendMessage(msg.ai, false);
                    });
                }
            } catch (e) { console.error(e); }
            scrollToBottom();
        }

        function startNewChat() {
            currentSessionId = null;
            chatContainer.innerHTML = '';
            chatContainer.appendChild(emptyState);
            emptyState.style.display = 'flex';
            userInput.value = '';
            loadSessions();
            userInput.focus();
        }

        function appendMessage(text, isUser) {
            emptyState.style.display = 'none';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            const bubble = document.createElement('div');
            bubble.className = `markdown-content max-w-[85%] rounded-lg px-4 py-2 text-sm leading-relaxed ${
                isUser ? 'bg-primary text-primary-foreground shadow-sm' : 'bg-muted text-foreground border border-border'
            }`;
            
            bubble.innerHTML = isUser ? text : DOMPurify.sanitize(marked.parse(text));
            
            div.appendChild(bubble);
            chatContainer.appendChild(div);
            scrollToBottom();
            return bubble;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;
            
            const aiBubble = appendMessage('...', false);
            aiBubble.innerHTML = '<span class="animate-pulse">Thinking...</span>';
            
            let fullText = '';
            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: currentSessionId })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            if (data.session_id) {
                                if (currentSessionId !== data.session_id) {
                                    currentSessionId = data.session_id;
                                    if(data.is_new) loadSessions();
                                }
                            } else if (data.content) {
                                fullText += data.content;
                                aiBubble.innerHTML = DOMPurify.sanitize(marked.parse(fullText));
                                scrollToBottom();
                            }
                        }
                    }
                }
            } catch (e) { aiBubble.innerHTML = '<span class="text-destructive">Error generating response.</span>'; }
            finally { sendBtn.disabled = false; loadSessions(); userInput.focus(); }
        }

        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
    </script>
</body>
</html>
